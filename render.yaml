services:
  - type: web
    name: foodsphere-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: foodsphere-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://foodsphere-app.pages.dev"

databases:
  - name: foodsphere-db
    databaseName: foodsphere
    user: foodsphere_user
    plan: free

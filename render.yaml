services:
  - type: web
    name: foodsphere-backend
    env: python
    rootDir: backend
    plan: free
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi --log-file - --timeout 120 --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://foodsphere-app.pages.dev"
      - key: PYTHON_VERSION
        value: "3.11.9"
